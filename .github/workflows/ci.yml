name: CI

on:
  push:
    branches: [main]
    tags: ['[0-9]*.[0-9]*.[0-9]*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore Auvik.Api.slnx

      - name: Build
        run: dotnet build Auvik.Api.slnx --no-restore --configuration Release

      - name: Pack
        run: dotnet pack Auvik.Api/Auvik.Api.csproj --no-build --configuration Release --output ./artifacts -p:IncludeSymbols=true -p:SymbolPackageFormat=snupkg

      - name: Upload NuGet artifact
        uses: actions/upload-artifact@v4
        with:
          name: nuget
          path: |
            ./artifacts/*.nupkg
            ./artifacts/*.snupkg

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      id-token: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: nuget
          path: ./artifacts

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: NuGet login (Trusted Publishing)
        uses: NuGet/login@v1
        id: login
        with:
          user: david_n_m_bond

      - name: Publish package to NuGet
        shell: pwsh
        run: |
          Get-ChildItem ./artifacts/*.nupkg |
            Where-Object { $_.Name -notlike '*.symbols.nupkg' } |
            ForEach-Object {
              dotnet nuget push $_.FullName --api-key ${{ steps.login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
            }

      - name: Publish symbols to NuGet
        shell: pwsh
        run: |
          Get-ChildItem ./artifacts/*.snupkg |
            ForEach-Object {
              dotnet nuget push $_.FullName --api-key ${{ steps.login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
            }
